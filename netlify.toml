[build]
  publish = "dist"
  command = "yarn build"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# Explicitly route /api/* to functions as a fallback for other endpoints
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200
  force = true

# SPA routing fallback
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
